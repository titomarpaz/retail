<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Zorzalense - Carbon Dark</title>

    <link rel="stylesheet" href="https://unpkg.com/carbon-components/css/carbon-components.min.css" />
    
    <style>
        /* Aplicamos el tema Gray 100 (Dark) */
        body {
            background-color: #161616; /* Carbon Gray 100 */
            color: #f4f4f4;            /* Carbon Gray 10 */
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        .carbon-container {
            background-color: #262626; /* Carbon Gray 90 para contraste */
            border: 1px solid #393939;
            margin-top: 3rem;
            padding: 2.5rem;
        }

        .brand-header {
            border-bottom: 1px solid #393939;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .brand-title {
            color: #78a9ff; /* Blue 40: Variante clara para fondos oscuros */
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* Estilo de los inputs en modo oscuro */
        .bx--select-input {
            background-color: #393939 !important;
            color: #f4f4f4 !important;
            border-bottom: 1px solid #8d8d8d !important;
        }

        .bx--label {
            color: #c6c6c6 !important;
        }

        /* Tarjetas "Tiles" en modo oscuro */
        .cds-tile {
            background-color: #393939;
            border: 1px solid #525252;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: background-color 0.2s;
        }

        .cds-tile:hover {
            background-color: #4d4d4d;
            cursor: pointer;
        }

        .tile-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Tipografía específica para datos de horarios */
        .time-label {
            color: #78a9ff;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .time-value {
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
        }

        /* Floating Action Button */
        .carbon-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #25612d; /* Verde oscuro para no romper el Dark Mode */
            color: #e5e5e5;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border: 1px solid #458a4c;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="bx--body">

<div class="bx--grid">
    <div class="bx--row bx--justify-content--center">
        <div class="bx--col-lg-10 bx--col-md-8 carbon-container">
            
            <div class="brand-header">
                <h1 class="brand-title">El Zorzalense</h1>
                <p class="bx--type-body-short-01" style="color: #a8a8a8;">Panel de Gestión Retail | Marcos Paz</p>
            </div>

            <div class="bx--form-item bx--row">
                <div class="bx--col-lg-6">
                    <label for="select-productos" class="bx--label">Inventario por Categoría</label>
                    <div class="bx--select">
                        <select id="select-productos" class="bx--select-input">
                            <option value="" disabled selected hidden>Buscar clasificación...</option>
                            <option value="almacen">Almacén</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="frescos">Lácteos y Frescos</option>
                        </select>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" fill="#f4f4f4" width="16" height="16" viewBox="0 0 16 16" class="bx--select__arrow">
                            <path d="M8 11L3 6 3.7 5.3 8 9.6 12.3 5.3 13 6z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bx--row bx--margin-top-8">
                <div class="bx--col-lg-3 bx--col-md-4">
                    <div class="cds-tile">
                        <span class="tile-icon">📦</span>
                        <span class="bx--type-productive-heading-01">Stock Real</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4">
                    <div class="cds-tile">
                        <span class="tile-icon">🏷️</span>
                        <span class="bx--type-productive-heading-01">Precios Bajos</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4">
                    <div class="cds-tile">
                        <span class="tile-icon">🚚</span>
                        <span class="bx--type-productive-heading-01">Envíos Hoy</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4">
                    <div class="cds-tile">
                        <span class="tile-icon">🦴</span>
                        <span class="bx--type-productive-heading-01">Pet Shop</span>
                    </div>
                </div>
            </div>

            <div class="bx--row bx--margin-top-9" style="border-top: 1px solid #393939; padding-top: 2rem;">
                <div class="bx--col-sm-2">
                    <p class="time-label">TURNO MAÑANA</p>
                    <p class="time-value">08:00 — 13:00</p>
                </div>
                <div class="bx--col-sm-2">
                    <p class="time-label">TURNO TARDE</p>
                    <p class="time-value">17:00 — 21:00</p>
                </div>
            </div>

        </div>
    </div>
</div>

<a href="#" class="carbon-fab">
    CENTRO DE AYUDA
</a>

</body>
</html>
