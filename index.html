<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Zorzalense - Gestión Retail</title>

    <meta property="og:title" content="El Zorzalense - Retail Digital">
    <meta property="og:description" content="Consulta stock y precios en tiempo real. Marcos Paz, Buenos Aires.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://tu-usuario.github.io/tu-repo/imagen-local.jpg">

    <meta name="theme-color" content="#1976d2">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/@mui/material@5.0.0/dist/material-ui.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f5f5f5; color: #333; }
        
        /* Elevación estilo Material UI */
        .card { 
            border-radius: 12px; border: none; 
            box-shadow: 0px 3px 1px -2px rgba(0,0,0,0.2), 0px 2px 2px 0px rgba(0,0,0,0.14), 0px 1px 5px 0px rgba(0,0,0,0.12);
            background: white;
        }

        .btn-material {
            background-color: #1976d2; color: white; border-radius: 4px;
            padding: 10px 20px; text-transform: uppercase; font-weight: 500;
            box-shadow: 0px 3px 1px -2px rgba(0,0,0,0.2); transition: 0.3s;
        }

        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px; background-color: #25d366;
            color: white; border-radius: 50px; padding: 15px 25px; z-index: 1000;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card p-5">
                <h1 class="fw-bold mb-3" style="color: #1976d2;">El Zorzalense</h1>
                <p class="text-secondary">Próximamente: Sistema de gestión con <strong>Python & PostgreSQL</strong></p>

                <div class="my-4">
                    <button id="btn-info" class="btn btn-material">
                        <i class="fas fa-info-circle"></i> Info del Local
                    </button>
                    <div id="tooltip" role="tooltip" style="display:none; background: #333; color: #fff; padding: 5px 10px; border-radius: 4px;">
                        Aníbal Troilo 463, Marcos Paz
                    </div>
                </div>

                <div class="row text-start mt-5">
                    <div class="col-6">
                        <small class="text-uppercase fw-bold text-muted">Mañana</small>
                        <p>Lun-Sáb: 8-13hs<br>Dom: 8-13hs</p>
                    </div>
                    <div class="col-6">
                        <small class="text-uppercase fw-bold text-muted">Tarde</small>
                        <p>Lun-Sáb: 17-21hs<br>Dom: 18-20hs</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 small text-muted">
                <span class="me-2"><i class="fas fa-bolt"></i> HTTP/3</span>
                <span class="me-2"><i class="fas fa-shield-alt"></i> Cloudflare</span>
                <span><i class="fab fa-python"></i> Backend Ready</span>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/5491135536745" class="whatsapp-btn">
    <i class="fab fa-whatsapp fa-lg"></i> Chatear ahora
</a>

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://unpkg.com/@popperjs/core@2"></script>

<script src="//instant.page/5.2.0" type="module"></script>

<script>
    // Ejemplo simple de Popper.js (el corazón de los menús desplegables)
    const button = document.querySelector('#btn-info');
    const tooltip = document.querySelector('#tooltip');

    button.addEventListener('mouseenter', () => {
        tooltip.style.display = 'block';
        Popper.createPopper(button, tooltip, { placement: 'top' });
    });

    button.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
    });

    console.log("Optimizando para HTTP/3 y Cloudflare Insights...");
</script>

</body>
</html>
