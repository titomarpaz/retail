<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Zorzalense - Gestión Retail</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <style>
        /* 2. Font Family: Aplicación global de Lato */
        body { 
            font-family: 'Lato', sans-serif !important; 
            background-color: #f5f5f5; 
            color: #333; 
        }

        h1, h2, h3, h4, h5, h6, .btn, .select2-container {
            font-family: 'Lato', sans-serif !important;
        }
        
        /* Estética Material UI con Lato */
        .card { 
            border-radius: 12px; border: none; 
            box-shadow: 0px 3px 6px rgba(0,0,0,0.1);
            background: white;
        }

        .brand-blue { color: #1976d2; }

        .select2-container--default .select2-selection--single {
            height: 50px; border-radius: 8px; border: 1px solid #ddd;
            display: flex; align-items: center;
        }

        .owl-item-card {
            background: #fff; padding: 20px; border-radius: 10px;
            border: 1px solid #eee; margin: 5px; text-align: center;
        }

        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px; background-color: #25d366;
            color: white; border-radius: 50px; padding: 15px 25px; z-index: 1000;
            text-decoration: none; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9 text-center">
            <div class="card p-4 p-md-5">
                <h1 class="fw-bold mb-2 brand-blue">El Zorzalense</h1>
                <p class="text-secondary mb-4">Innovación en Retail Digital - Marcos Paz Buenos Aires</p>

                <div class="text-start mb-4">
                    <label class="form-label small fw-bold text-muted">¿Qué buscas hoy?</label>
                    <select class="selector-productos" name="state">
                        <option value=""></option>
                        <option value="almacen">Almacén</option>
                        <option value="bebidas">Bebidas</option>
                        <option value="frescos">Lácteos y Frescos</option>
                        <option value="limpieza">Limpieza</option>
                        <option value="analgesicos">Analgésicos</option>
                        <option value="perfumeria">Perfumería</option>

                    </select>
                </div>

                <div class="owl-carousel owl-theme mb-5">
                    <div class="owl-item-card">
                        <i class="fas fa-barcode fa-2x brand-blue mb-2"></i>
                        <h6 class="fw-bold">Stock Real</h6>
                    </div>
                    <div class="owl-item-card">
                        <i class="fas fa-tag fa-2x text-success mb-2"></i>
                        <h6 class="fw-bold">Precios Bajos</h6>
                    </div>
                    <div class="owl-item-card">
                        <i class="fas fa-shipping-fast fa-2x text-warning mb-2"></i>
                        <h6 class="fw-bold">Envíos Hoy</h6>
                    </div>
                    <div class="owl-item-card">
                        <i class="fas fa-shopping-cart fa-2x "></i>
                        <h6 class="fw-bold">Pet Shop</h6>
                    </div>
                </div>

                <div class="row text-start border-top pt-4">
                    <div class="col-6">
                        <small class="text-muted fw-bold">TURNO MAÑANA</small>
                        <p class="mb-0">8-13hs</p>
                    </div>
                    <div class="col-6">
                        <small class="text-muted fw-bold">TURNO TARDE</small>
                        <p class="mb-0">17-21hs (Dom 18-20)</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 small text-muted">
                <i class="fab fa-python"></i> Python & PostgreSQL Ready | <i class="fas fa-bolt"></i> Instant.Page | Font Awesome
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/5491135536745" class="whatsapp-btn">
    <i class="fab fa-whatsapp fa-lg me-2"></i> Escribir al Chat
</a>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="//instant.page/5.2.0" type="module"></script>

<script>
    $(document).ready(function(){
        $('.selector-productos').select2({
            placeholder: "Buscar por clasificación...",
            allowClear: true,
            width: '100%'
        });

        $(".owl-carousel").owlCarousel({
            loop: true,
            margin: 10,
            autoplay: true,
            autoplayTimeout: 3000,
            responsive: { 0: { items: 1 }, 600: { items: 2 }, 1000: { items: 3 } }
        });
    });
</script>

</body>
</html>
