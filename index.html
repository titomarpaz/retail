<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Zorzalense </title>

    <link rel="stylesheet" href="https://1.www.s81c.com/common/carbon-for-ibm-dotcom/tag/v1/canary/plex.css" />
    <link rel="stylesheet" href="https://unpkg.com/carbon-components/css/carbon-components.min.css" />
    
    <style>
        body {
            background-color: #f4f4f4; /* Gray 10 de Carbon */
            font-family: 'IBM Plex Sans', sans-serif;
        }

        /* Contenedor principal estilo Dashboard */
        .carbon-container {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            margin-top: 3rem;
            padding: 2rem;
        }

        .brand-header {
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .brand-title {
            color: #0f62fe; /* Blue 60 de IBM */
            font-weight: 300; /* Estética ligera de Carbon */
            letter-spacing: 0.5px;
        }

        /* Estilo Carbon para los Selectores */
        .bx--label {
            font-weight: 600;
            color: #525252;
        }

        /* Tarjetas estilo "Tile" de Carbon */
        .cds-tile {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            padding: 1rem;
            transition: background-color 0.1s;
        }

        .cds-tile:hover {
            background-color: #e5e5e5;
            cursor: pointer;
        }

        .tile-icon {
            color: #0f62fe;
            margin-bottom: 1rem;
        }

        /* Footer con datos técnicos */
        .tech-stack {
            background-color: #161616; /* Gray 100 */
            color: #f4f4f4;
            padding: 0.5rem 1rem;
            margin-top: 2rem;
            font-size: 0.75rem;
        }

        /* Botón de acción flotante (estilo Carbon) */
        .carbon-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #25d366; /* Mantengo el verde Whatsapp */
            color: white;
            padding: 1rem 1.5rem;
            border: none;
            display: flex;
            align-items: center;
            font-weight: 400;
            text-decoration: none;
        }
    </style>
</head>
<body class="bx--body">

<div class="bx--grid">
    <div class="bx--row bx--justify-content--center">
        <div class="bx--col-lg-10 bx--col-md-8 carbon-container">
            
            <div class="brand-header">
                <h1 class="brand-title">El Zorzalense</h1>
                <p class="bx--type-body-short-01">Gestión Retail | Marcos Paz, Buenos Aires</p>
            </div>

            <div class="bx--form-item bx--row">
                <div class="bx--col-lg-6">
                    <label for="select-productos" class="bx--label">¿Qué buscas hoy?</label>
                    <div class="bx--select">
                        <select id="select-productos" class="bx--select-input">
                            <option class="bx--select-option" value="" disabled selected hidden>Selecciona una categoría</option>
                            <option class="bx--select-option" value="almacen">Almacén</option>
                            <option class="bx--select-option" value="bebidas">Bebidas</option>
                            <option class="bx--select-option" value="frescos">Lácteos y Frescos</option>
                        </select>
                        <svg focusable="false" preserveAspectRatio="xMidYMid meet" fill="currentColor" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" class="bx--select__arrow">
                            <path d="M8 11L3 6 3.7 5.3 8 9.6 12.3 5.3 13 6z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bx--row bx--margin-top-8">
                <div class="bx--col-lg-3 bx--col-md-4 bx--col-sm-2">
                    <div class="cds-tile">
                        <div class="tile-icon">📦</div>
                        <span class="bx--type-productive-heading-01">Stock Real</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4 bx--col-sm-2">
                    <div class="cds-tile">
                        <div class="tile-icon">🏷️</div>
                        <span class="bx--type-productive-heading-01">Precios Bajos</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4 bx--col-sm-2">
                    <div class="cds-tile">
                        <div class="tile-icon">⚡</div>
                        <span class="bx--type-productive-heading-01">Envíos Hoy</span>
                    </div>
                </div>
                <div class="bx--col-lg-3 bx--col-md-4 bx--col-sm-2">
                    <div class="cds-tile">
                        <div class="tile-icon">🐾</div>
                        <span class="bx--type-productive-heading-01">Pet Shop</span>
                    </div>
                </div>
            </div>

            <div class="bx--row bx--margin-top-9" style="border-top: 1px solid #e0e0e0; padding-top: 2rem;">
                <div class="bx--col-sm-2">
                    <p class="bx--label">TURNO MAÑANA</p>
                    <p class="bx--type-body-long-02">08:00 — 13:00</p>
                </div>
                <div class="bx--col-sm-2">
                    <p class="bx--label">TURNO TARDE</p>
                    <p class="bx--type-body-long-02">17:00 — 21:00</p>
                </div>
            </div>

        </div>
    </div>

    <div class="bx--row bx--justify-content--center">
        <div class="bx--col-lg-10 tech-stack">
            <span>PYTHON & POSTGRESQL READY | CARBON DESIGN SYSTEM | IBM PLEX SANS</span>
        </div>
    </div>
</div>

<a href="#" class="carbon-fab">
    CHAT WHATSAPP
</a>

</body>
</html>
